name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:  # allow manual runs from the Actions tab / `gh workflow run CI`

# Least privilege: none of the jobs write to the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    name: Python syntax (compileall)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      # Byte-compile sources — catches syntax errors without installing deps.
      - run: python -m compileall -q app.py core routes src services scripts tests

  node-syntax:
    name: JS syntax (node --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
      # Syntax-check the last remaining JS (CI helper scripts — the legacy
      # static/ frontend was deleted in Slice 7; Gate 6e forbids new JS).
      - name: node --check
        run: |
          shopt -s nullglob
          for f in .github/scripts/*.js; do
            node --check "$f"
          done

  # Gate 2 (ADR 0002): the pytest suite is REQUIRED — it blocks merge. The suite is
  # green (2377 passed locally); any test that proves flaky / environment-dependent in
  # CI gets the `quarantine` marker (registered in pyproject.toml) and moves to the
  # informational job below, rather than the whole gate reverting to continue-on-error.
  python-tests:
    name: Python tests (pytest, required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdir -p data  # sqlite DB lives at ./data/app.db
      - run: python -m pytest -q --strict-markers -m "not quarantine"

  # Informational only (never blocks): surfaces the status of quarantined tests so they
  # stay visible and get fixed + untagged, instead of silently rotting.
  python-tests-quarantine:
    name: Python tests (quarantined, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdir -p data
      - name: Run quarantined tests (exit 5 = none quarantined = OK)
        run: |
          rc=0
          python -m pytest -q --strict-markers -m quarantine || rc=$?
          if [ "$rc" = "5" ]; then echo "No quarantined tests."; rc=0; fi
          exit $rc

  # Gate 6 (ADR 0002): architectural fitness functions. Pure bash, no deps — fast.
  fitness:
    name: Fitness functions (Gate 6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - run: bash .fitness/run-all.sh

  # Gate 1 (ADR 0002): typed contract drift. Regenerate the OpenAPI schema from a fresh
  # `app.openapi()` and the TS types from it; fail if the committed schema.d.ts differs.
  # If this trips on a clean tree it means the backend contract changed without
  # regenerating — run `python scripts/openapi-export.py && (cd web && bun run gen:api)`
  # and commit web/src/api/schema.d.ts.
  web-contract:
    name: Web contract drift (Gate 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdir -p data
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - run: cd web && bun install --frozen-lockfile
      - name: Regenerate schema and check for drift
        run: |
          python scripts/openapi-export.py
          (cd web && bun run gen:api)
          git diff --exit-code web/src/api/schema.d.ts
      - name: Gate 6b — UI-contract endpoints are typed
        # Runs here (not in the `fitness` job) because it needs the regenerated openapi.json.
        run: bash .fitness/route-response-models.sh

  # Gate 4 (ADR 0002): TypeScript strict + ESLint.
  web-typecheck-lint:
    name: Web typecheck + lint (Gate 4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - run: cd web && bun install --frozen-lockfile
      - run: cd web && bun run typecheck
      - run: cd web && bun run lint

  # Gate 3 (ADR 0002), unit/component: Vitest.
  web-unit:
    name: Web unit tests (Gate 3 — Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - run: cd web && bun install --frozen-lockfile
      - run: cd web && bun run test

  # Gate 3 (ADR 0002), critical flows: Playwright. Slice 0 only smoke-loads the shell
  # (no backend needed); the login -> chat-stream flow arrives in Slice 1.
  web-e2e:
    name: Web e2e (Gate 3 — Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
      - run: cd web && bun install --frozen-lockfile
      - run: cd web && bunx playwright install --with-deps chromium
      - run: cd web && bun run e2e
